<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>leafTube bar</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      min-height: 45px;
      height: 100vh;
      background: rgba(5, 6, 7, 0.9);
      color: #fef6e4;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 14px;
      -webkit-app-region: drag;
    }

    .bar-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      opacity: 0.9;
      flex-shrink: 0;
    }

    .bar-center {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
      max-width: 520px;
      margin: 0 auto;
    }

    .bar-search-input {
      -webkit-app-region: no-drag;
      flex: 1;
      min-width: 120px;
      height: 32px;
      padding: 0 12px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      background: rgba(11, 15, 18, 0.527);
      color: #fef6e4;
      font-size: 13px;
      outline: none;
    }

    .bar-search-input::placeholder {
      color: rgba(254, 246, 228, 0.5);
    }

    .bar-search-input:focus {
      border-color: rgba(255, 255, 255, 0.3);
    }

    .bar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* same as mini-app .icon-button */
    .bar-button {
      -webkit-app-region: no-drag;
      width: 36px;
      height: 26px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      background: rgba(11, 15, 18, 0.527);
      color: #fef6e4;
      padding: 0;
      cursor: pointer;
      outline: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .bar-button:hover {
      background: rgba(16, 22, 26, 0.9);
    }

    .bar-button .bar-icon {
      width: 13px;
      height: 13px;
      object-fit: contain;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="bar-left">
    <img src="../public/icon.png" alt="" width="16" height="16" />
  </div>
  <div class="bar-center"></div>
  <div class="bar-right">
    <button type="button" class="bar-button" aria-label="minimize" onclick="window.leafYoutubeBar?.shrink()">
      <img class="bar-icon" src="../public/icons/minimize.png" alt="" />
    </button>
    <button type="button" class="bar-button" aria-label="close" onclick="window.leafYoutubeBar?.closeApp()">
      <img class="bar-icon" src="../public/icons/close.png" alt="" />
    </button>
  </div>
</body>

</html>
